name: Review PR with Codex

on:
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Pull request number to review"
        required: true
        type: number

concurrency:
  group: codex-review-pr-${{ github.event.issue.number || inputs.pr_number }}
  cancel-in-progress: true

jobs:
  review:
    # issue_comment: only on PRs, only "@boterinas codex", only members/contributors.
    # workflow_dispatch: always allowed (for maintainer use).
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(github.event.comment.body, '@boterinas codex') &&
       (github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'COLLABORATOR' ||
        github.event.comment.author_association == 'CONTRIBUTOR'))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
    steps:
      # The job-level `contains()` is a substring match. This step does a
      # stricter check: "@boterinas codex" must appear at the start of a line
      # so that blockquotes, inline code, or mid-sentence mentions are ignored.
      - name: Validate trigger command
        if: github.event_name == 'issue_comment'
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          if ! printf '%s\n' "$COMMENT_BODY" | grep -qE '^\s*@boterinas\s+codex($|\s)'; then
            echo "::notice::No valid @boterinas codex command found at start of line."
            exit 1
          fi

      - name: React to trigger comment
        if: github.event_name == 'issue_comment'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api \
            "repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" \
            --method POST \
            -f content='eyes'

      - name: Get PR info
        id: pr_info
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PR_NUMBER="${{ inputs.pr_number }}"
          else
            PR_NUMBER="${{ github.event.issue.number }}"
          fi
          echo "pr_number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"

          PR_JSON=$(gh api repos/${{ github.repository }}/pulls/${PR_NUMBER})
          echo "head_sha=$(echo "$PR_JSON" | jq -r .head.sha)" >> "$GITHUB_OUTPUT"
          echo "head_repo=$(echo "$PR_JSON" | jq -r .head.repo.full_name)" >> "$GITHUB_OUTPUT"
          echo "base_sha=$(echo "$PR_JSON" | jq -r .base.sha)" >> "$GITHUB_OUTPUT"
          echo "base_ref=$(echo "$PR_JSON" | jq -r .base.ref)" >> "$GITHUB_OUTPUT"
          echo "title=$(echo "$PR_JSON" | jq -r .title)" >> "$GITHUB_OUTPUT"

          # Use a random delimiter to prevent injection via PR body content
          BODY_DELIM="$(uuidgen)"
          echo "body<<${BODY_DELIM}" >> "$GITHUB_OUTPUT"
          echo "$PR_JSON" | jq -r '.body // ""' >> "$GITHUB_OUTPUT"
          echo "${BODY_DELIM}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          repository: ${{ steps.pr_info.outputs.head_repo }}
          ref: ${{ steps.pr_info.outputs.head_sha }}
          fetch-depth: 0

      # For fork PRs, the base branch tip may not exist in the fork's history.
      # Fetch it from the base repo so that git diff can find the merge-base.
      - name: Fetch base ref for fork PRs
        if: steps.pr_info.outputs.head_repo != github.repository
        run: |
          git remote add base-repo "https://github.com/${{ github.repository }}.git"
          git fetch base-repo "${{ steps.pr_info.outputs.base_ref }}"

      # Always fetch the schema and the aster-pr-review skill scripts from
      # the workflow's commit, not the PR checkout. The PR branch may predate
      # these files, and fork PRs should not supply their own.
      - name: Fetch Codex schema and skill scripts from upstream
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          WORKFLOW_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          fetch() {
            local dest="$1"
            mkdir -p "$(dirname "$dest")"
            gh api "repos/${REPOSITORY}/contents/${dest}?ref=${WORKFLOW_SHA}" \
              --jq '.content' | base64 -d > "$dest"
          }
          fetch .github/codex-output-schema.json
          fetch .agents/skills/aster-pr-review/scripts/submit_review.sh
          fetch .agents/skills/aster-pr-review/scripts/validate_review.py
          fetch .agents/skills/aster-pr-review/scripts/from_codex_json.py
          chmod +x .agents/skills/aster-pr-review/scripts/submit_review.sh
          chmod +x .agents/skills/aster-pr-review/scripts/validate_review.py
          chmod +x .agents/skills/aster-pr-review/scripts/from_codex_json.py

      - name: Build prompt
        env:
          BASE_SHA: ${{ steps.pr_info.outputs.base_sha }}
          HEAD_SHA: ${{ steps.pr_info.outputs.head_sha }}
          PR_NUMBER: ${{ steps.pr_info.outputs.pr_number }}
          PR_TITLE: ${{ steps.pr_info.outputs.title }}
          PR_BODY: ${{ steps.pr_info.outputs.body }}
        run: |
          cat > codex-prompt.md <<'PROMPT_HEADER'
          You are reviewing a pull request for the Asterinas kernel. Produce structured findings per the output schema, plus a `summary` covering cross-cutting themes.

          Cover three zoom levels (you do not need to label them — just make sure issues at each level are surfaced when they exist):

          * Design (macro): architecture, API surface clarity, type safety, module boundaries, whether new pieces fit the existing structure, and overarching design principles (single responsibility, DRY, information hiding, least surprise, loose coupling, consistency).
          * Correctness (meso): logical bugs, off-by-one errors, error-handling gaps, race conditions, lock ordering, atomic-ordering pairing, Linux ABI / behavioral conformance when the PR touches a syscall, /proc, /sys, or other Linux-facing surface, and test-coverage adequacy.
          * Craft (micro): naming, consistency in style and patterns across the diff, unnecessary clones/heap allocations/atomic ops on hot paths, and conformance to the coding guidelines in book/src/to-contribute/coding-guidelines/. For each guideline citation, build a hyperlink: take the guideline's relative path from the Index in README.md (e.g., "rust-guidelines/language-items/functions-and-methods.md#small-functions") and prepend "https://asterinas.github.io/book/to-contribute/coding-guidelines/", replacing the trailing .md with .html.

          Output rules (these are MANDATORY — violations cause findings to be dropped on submit):

          * One finding per root cause. If several symptoms share one underlying bug or design flaw, file ONE finding that names the root cause and gives the single fix that resolves all of them; cross-reference the other symptom lines in the body rather than filing per-symptom comments.
          * Each finding's `body` should end with a concrete fix: a diff, a code snippet, a one-liner command, or a specific API / flag to use. Only omit a fix when the issue requires design discussion first — and say so explicitly ("No fix suggested: this needs a design decision on X.").
          * Each finding's `priority`: 0 = blocker (must fix before merge), 1 = significant (should fix), 2 = minor (style or low-impact). Prefer fewer, higher-signal findings; only include minor-priority findings when there are no significant ones.
          * `code_location.line_range` MUST point to lines that are part of the PR's unified diff on the RIGHT side (i.e., added lines or context lines around them). Pre-existing lines that the PR did not touch are NOT anchorable — anchoring there causes GitHub to silently drop the comment. If you need to call out pre-existing code, re-anchor to a related diff line and describe the pre-existing problem in the body.
          * `code_location.absolute_file_path`: use repository-relative paths (e.g., "kernel/src/foo.rs"), NOT absolute filesystem paths (e.g., "/home/runner/work/...").

          After listing findings, write the `summary`: synthesize cross-cutting themes, what the PR does well, the top 2-3 issues that need attention, and any structural recommendations. Do not bullet-list every finding — the findings array already does that.
          PROMPT_HEADER

          {
            printf '\n'
            printf 'Repository: %s\n' "${{ github.repository }}"
            printf 'Pull Request #: %s\n' "${PR_NUMBER}"
            printf 'Base SHA: %s\n' "${BASE_SHA}"
            printf 'Head SHA: %s\n' "${HEAD_SHA}"
            printf '\n'
            printf 'Pull request title: %s\n' "${PR_TITLE}"
            printf 'Pull request body:\n'
            printf '%s\n' "${PR_BODY}"
            printf '\n'
            printf 'Changed files:\n'
            git --no-pager diff --name-status "${BASE_SHA}...${HEAD_SHA}"
            echo ""
            echo "Unified diff (context=5, truncated to 200000 chars):"
            DIFF=$(git --no-pager diff --unified=5 "${BASE_SHA}...${HEAD_SHA}")
            if [ ${#DIFF} -gt 200000 ]; then
              echo "${DIFF:0:200000}"
              echo ""
              echo "[diff truncated — exceeded 200000 character limit]"
            else
              echo "$DIFF"
            fi
          } >> codex-prompt.md

      - name: Run Codex
        id: run_codex
        uses: openai/codex-action@94bb7a052e529936e5260a35838e61b190855739 # v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          model: gpt-5.3-codex
          prompt-file: codex-prompt.md
          output-schema-file: .github/codex-output-schema.json
          output-file: codex-output.json
          sandbox: read-only

      # The Codex output is routed through the aster-pr-review skill's
      # pipeline: from_codex_json.py converts the structured JSON to the
      # skill's markdown review format (filtering findings whose lines fall
      # outside the diff), and submit_review.sh posts the review via
      # GraphQL and finalizes it as a COMMENT.
      - name: Generate PR diff for anchor filtering
        env:
          BASE_SHA: ${{ steps.pr_info.outputs.base_sha }}
          HEAD_SHA: ${{ steps.pr_info.outputs.head_sha }}
        run: git --no-pager diff "${BASE_SHA}...${HEAD_SHA}" > pr.diff

      - name: Convert Codex JSON to skill review markdown
        env:
          REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ steps.pr_info.outputs.pr_number }}
          HEAD_SHA: ${{ steps.pr_info.outputs.head_sha }}
          PR_TITLE: ${{ steps.pr_info.outputs.title }}
        run: |
          set -euo pipefail
          if [ ! -f codex-output.json ]; then
            echo "No Codex output found, nothing to submit."
            exit 0
          fi
          if ! jq -e '.findings and .summary' codex-output.json > /dev/null 2>&1; then
            echo "Codex output is missing required fields or is invalid JSON, skipping."
            exit 0
          fi
          python3 .agents/skills/aster-pr-review/scripts/from_codex_json.py \
            --codex-json codex-output.json \
            --pr "${PR_NUMBER}" \
            --repo "${REPOSITORY}" \
            --head-sha "${HEAD_SHA}" \
            --workspace "${GITHUB_WORKSPACE}" \
            --title "${PR_TITLE}" \
            --event comment \
            --diff pr.diff \
            --attribution "## Reviews by Codex" \
            > review.md
          echo "=== Generated review.md ==="
          cat review.md

      - name: Submit review to GitHub
        if: hashFiles('review.md') != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          bash .agents/skills/aster-pr-review/scripts/submit_review.sh \
            --finalize review.md
